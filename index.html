<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elemental Synthesis Lab - Genshin Mini Game</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="text-white p-4 sm:p-8">
    <div class="relative max-w-4xl mx-auto">
      <header class="text-center mb-10">
        <h1
          class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600 mb-2"
        >
          Elemental Synthesis Lab
        </h1>
        <p class="text-xl text-gray-300">
          Mix reactions to discover new powers of Teyvat!
        </p>
      </header>

      <!-- Message Area -->
        <div
          id="message-box"
          class="mb-4 p-4 rounded-lg shadow-lg text-center text-lg transition duration-300 ease-in-out bg-gray-700"
        >
          Welcome, Alchemist! Drag an element from the top into the open lab
          space to start.
        </div>

      <!-- Found Elements (Source Area) -->
      <div class="mb-8 p-4 bg-gray-800 rounded-xl shadow-2xl">
        <h2
          class="text-xl font-semibold mb-3 border-b border-gray-600 pb-2 text-yellow-300"
        >
          Available Elements & Reactions:
        </h2>
        <div
          id="element-source"
          class="flex flex-wrap gap-4 p-2 justify-center sm:justify-start"
        >
          <!-- Tiles will be rendered here by JavaScript -->
        </div>
      </div>

      <!-- Reaction Lab (Target Area) -->

      <div
        id="reaction-lab"
        class="reaction-lab p-6 rounded-xl transition-colors duration-300"
        ondragover="handleDragOver(event)"
        ondrop="handleDrop(event)"
      >
        <p
          id="lab-placeholder"
          class="text-gray-500 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-2xl font-light pointer-events-none"
        >
          Drop elements here to create!
        </p>
        <p
          class="text-white-500 absolute top-[5px] right-[10px] text-2xl font-bold pointer-events-none"
        >
          <span id="counter">0</span>/15
        </p>
        <!-- Dropped elements/new reactions will appear here -->
      </div>

      <!-- Controls -->
      <div class="mt-8 text-center">
        <button
          onclick="resetLab()"
          class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-lg transition transform hover:scale-105"
        >
          Reset Lab
        </button>
      </div>
    </div>

    <div
      id="congoMsg"
      class="fixed inset-0 flex items-center justify-center z-50 transition-opacity duration-500"
    >
      <div
        class="bg-[#0f172a] rounded-3xl shadow-2xl p-8 text-center border-4 border-[#60a5fa]"
      >
        <h1
          class="title text-4xl font-extrabold text-yellow-300 mb-4 drop-shadow-lg"
        >
          🎉 Congratulations! 🎉
        </h1>
        <p class="text-xl text-white mb-6 font-semibold">
          You have found all Elemental Reactions!
        </p>
        <button
          onclick="hideCongoMsg()"
          class="px-8 py-3 bg-yellow-400 hover:bg-yellow-500 text-indigo-900 font-bold rounded-xl shadow-lg transition transform hover:scale-105 text-lg"
        >
          OK
        </button>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
